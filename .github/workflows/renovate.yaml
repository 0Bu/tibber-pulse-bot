name: Renovate
on:
  schedule:
    - cron: '0 5 * * *'
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          # RENOVATE_TOKEN must be a PAT that can BOTH push branches AND open
          # pull requests. Symptom of an under-scoped token: Renovate pushes
          # renovate/* branches but opens zero PRs (and may log "Error updating
          # branch: update failure"). Required scopes:
          #   - classic PAT: `repo` + `workflow`, or
          #   - fine-grained PAT (this repo): Contents RW, Pull requests RW,
          #     Workflows RW.
          # `workflow` is needed because config:best-practices +
          # pinGitHubActionDigests let Renovate edit .github/workflows/**.
          # Verify the PR flow via the Dependency Dashboard issue Renovate opens.
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_PLATFORM: github
          RENOVATE_PLATFORM_COMMIT: true
          RENOVATE_EXTENDS: config:best-practices,customManagers:dockerfileVersions,customManagers:helmChartYamlAppVersions,helpers:pinGitHubActionDigests
          RENOVATE_AUTODISCOVER: true
          RENOVATE_AUTODISCOVER_FILTER: ${{ github.repository }}
          RENOVATE_CONFIG_MIGRATION: true
          RENOVATE_AUTOMERGE: true
          RENOVATE_BUMP_VERSION: patch
          # Wait for required status checks (vuln/test/build) before automerging
          # so a failing dependency bump is never merged automatically.
          RENOVATE_IGNORE_TESTS: false
          # 'auto' lets Renovate refresh/rebase its PR branches so they pick up
          # the latest target version and re-run required checks. 'never' froze
          # PRs (no version bump, no check re-run), which blocked automerge.
          RENOVATE_REBASE_WHEN: auto
          RENOVATE_SEMANTIC_COMMITS: disabled
#         LOG_LEVEL: debug
#         RENOVATE_DRY_RUN: full
