name: test

# Always-on correctness gate (gofmt/vet/go test). Deliberately has NO paths
# filter so the `test` check reports on every PR — including doc/chart/
# workflow-only PRs — which lets it be a required status check on main
# without ever leaving a required check permanently pending. The heavier
# docker build stays path-filtered in docker.yml.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
