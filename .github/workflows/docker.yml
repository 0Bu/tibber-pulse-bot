name: docker

on:
  push:
    tags: ["v*.*.*"]
  # Path-filtered: building the image (and, on tags, the docker tag/release)
  # only makes sense for code changes. Doc/chart/workflow-only PRs skip this
  # workflow. The always-on correctness gate lives in test.yml instead.
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase: GHCR rejects mixed-case image names, but the repo
  # owner "0Bu" is mixed-case. Update if the repo is renamed/forked.
  IMAGE_NAME: 0bu/tibber-pulse-bot

# Supersede in-progress runs for the same ref to save runner minutes, but
# never cancel a tag (release) build mid-flight — only PR runs are coalesced.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod
          go-package: ./...
          repo-checkout: false

  build:
    needs: [vuln]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: write # dispatch Renovate after a successful tag build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # No QEMU: the Dockerfile cross-compiles the static Go binary on the
      # native build platform, so no foreign-arch emulation is needed.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: vars
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag scheme:
          #   on tag v1.0.6 push → :1.0.6
          #   on PR              → :pr-<n> (build only, not pushed)
          # SHA256 digest assigned by GHCR, reference as:
          #   image: ghcr.io/0bu/tibber-pulse-bot:1.0.6@sha256:<digest>
          flavor: |
            latest=false
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && github.ref_type == 'tag' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # After a tag build the new image is in GHCR; kick Renovate so it bumps
      # the Helm chart and docker-compose to the freshly published version.
      # ref_type=tag means this is a release build (PR builds are skipped).
      - name: Trigger Renovate to update chart + docker-compose
        if: github.ref_type == 'tag'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'renovate.yaml',
              ref: 'main',
            });
