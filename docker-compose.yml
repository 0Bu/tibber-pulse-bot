services:
  tibber-pulse-bot:
    # Published image, pinned by digest and kept current by Renovate
    # (docker-compose changes intentionally do NOT trigger a tag/build).
    # To build from source instead, see "Run with Docker" in the README.
    image: ghcr.io/0bu/tibber-pulse-bot:1.0.13@sha256:1d3b5a70dc3f6c3d097bc6877954543af9c49ab69d14b8a5cabc8b91ed67c314
    container_name: tibber-pulse-bot
    restart: unless-stopped
    environment:
      TIBBER_PULSE_PASSWORD: ${TIBBER_PULSE_PASSWORD:?set TIBBER_PULSE_PASSWORD in .env}
    command:
      - --pulse-host=${TIBBER_PULSE_HOST:?set TIBBER_PULSE_HOST in .env}
      - --mqtt-host=${MQTT_HOST:?set MQTT_HOST in .env}
      - --mqtt-port=${MQTT_PORT:-1883}
      - --mqtt-topic=${MQTT_TOPIC:-tibber/pulse}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
